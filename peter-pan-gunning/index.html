<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 작성자: 업무천재 고주무관 -->
<meta name="author" content="업무천재 고주무관">
<title>총 든 피터팬</title>
<style>
  :root{
    /* 라이트 기준 팔레트만 사용 (다크모드 미적용) */
    --sky-top:#bcd4e6;
    --sky-bottom:#e8f0f7;
    --pan-green:#3f7d3a;
    --pan-green-dark:#2c5a28;
    --skin:#f1c7a5;
    --hair:#c1652a;
    --feather:#d23b3b;
    --steel:#5a5f66;
    --steel-light:#888d94;
    --ink:#2b2b2b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 70%);
    color:var(--ink);
    min-height:100vh;
    overflow:hidden;
    -webkit-user-select:none; user-select:none;
  }

  /* 무대: 표적과 캐릭터가 같이 놓이는 영역 */
  .stage{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
  }

  /* 상단 타이틀/대사 카드 */
  .caption{
    position:absolute; top:18px; left:50%;
    transform:translateX(-50%);
    text-align:center; z-index:5;
    pointer-events:none;
  }
  .caption h1{
    margin:0; font-size:clamp(22px,5vw,40px);
    letter-spacing:1px;
  }
  .caption p{
    margin:6px 0 0; font-size:clamp(12px,2.6vw,15px);
    opacity:.72; line-height:1.45;
  }

  /* 스트레스 게이지 (좌상단 HUD) */
  .hud{
    position:absolute; top:16px; left:16px; z-index:6;
    background:rgba(255,255,255,.75);
    border:1px solid rgba(0,0,0,.08);
    border-radius:12px; padding:10px 12px;
    font-size:12px; backdrop-filter:blur(2px);
    min-width:170px;
  }
  .hud b{display:block;margin-bottom:6px;font-size:13px;}
  .bar{height:10px;background:#d9dee4;border-radius:6px;overflow:hidden;}
  .bar > i{
    display:block;height:100%;width:100%;
    background:linear-gradient(90deg,#3fa34d,#8ed18a);
    transition:width .35s ease;
  }
  .hud .hit{margin-top:6px;opacity:.65;}

  /* 부유하는 별 배경 (네버랜드 분위기) */
  .star{position:absolute;color:#fff;opacity:.85;
    text-shadow:0 0 6px rgba(255,255,255,.8);
    font-size:14px;animation:twinkle 3s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.25;}50%{opacity:.9;}}

  /* 피터팬: 공중에 떠 있음 = '어른이 되지 못함'의 시각화 */
  .pan{
    position:absolute; bottom:8vh; left:50%;
    width:clamp(180px,40vw,300px);
    transform:translateX(-50%);
    animation:hover 3.2s ease-in-out infinite;
    z-index:4;
  }
  @keyframes hover{
    0%,100%{transform:translateX(-50%) translateY(0) rotate(-1deg);}
    50%{transform:translateX(-50%) translateY(-22px) rotate(1deg);}
  }
  /* 총구 화염: 발사 시 잠깐 보임 */
  .muzzle{opacity:0;transform-origin:center;}
  .pan.firing .muzzle{animation:flash .18s ease-out;}
  @keyframes flash{0%{opacity:0;transform:scale(.4);}40%{opacity:1;transform:scale(1.1);}100%{opacity:0;transform:scale(.6);}}
  /* 발사 반동: 캐릭터가 살짝 뒤로 밀림 */
  .pan.firing{animation:recoil .18s ease-out;}
  @keyframes recoil{0%{transform:translateX(-50%) translateX(0);}30%{transform:translateX(-50%) translateX(-10px) rotate(-2deg);}100%{transform:translateX(-50%) translateX(0);}}

  /* 표적: 클릭(=사격) 대상 */
  .target{
    position:absolute; width:54px; height:54px;
    cursor:crosshair; z-index:3;
    will-change:transform;
  }
  .target.pop{animation:pop .3s ease-out forwards;}
  @keyframes pop{0%{transform:scale(1);opacity:1;}100%{transform:scale(1.6);opacity:0;}}

  .reset{
    position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
    z-index:6;border:none;border-radius:20px;padding:9px 18px;
    background:var(--pan-green);color:#fff;font-size:13px;cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
  }
  .reset:active{transform:translateX(-50%) translateY(1px);}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="caption">
      <h1>총 든 피터팬</h1>
      <p>어른이 되는 데 실패했지만, 표적 맞히는 건 은근 스트레스가 풀린다.<br>떠다니는 표적을 클릭해서 쏴 보세요.</p>
    </div>

    <div class="hud">
      <b>스트레스 게이지</b>
      <div class="bar"><i id="barFill"></i></div>
      <div class="hit">명중: <span id="hitCount">0</span></div>
    </div>

    <!-- 피터팬 + 가스건 (전부 인라인 SVG 도형으로 직접 조립) -->
    <svg class="pan" id="pan" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" aria-label="총 든 피터팬">
      <!-- 그림자 (지면에 닿지 않음 = 부유 강조) -->
      <ellipse cx="100" cy="252" rx="46" ry="7" fill="rgba(0,0,0,.12)"/>

      <!-- 다리(초록 타이츠) -->
      <path d="M86 188 L82 232 L92 232 L98 196 Z" fill="var(--pan-green)"/>
      <path d="M114 188 L120 232 L110 232 L104 196 Z" fill="var(--pan-green-dark)"/>
      <!-- 뾰족 신발 -->
      <path d="M78 230 Q72 246 86 240 L92 232 Z" fill="#6b4a2b"/>
      <path d="M122 230 Q128 246 114 240 L108 232 Z" fill="#6b4a2b"/>

      <!-- 몸통(지그재그 밑단 튜닉) -->
      <path d="M70 110 Q100 100 130 110 L134 184
               L124 176 L116 188 L108 176 L100 188
               L92 176 L84 188 L76 176 L66 184 Z"
            fill="var(--pan-green)"/>
      <path d="M70 110 Q100 100 130 110 L132 130 Q100 122 68 130 Z"
            fill="var(--pan-green-dark)" opacity=".5"/>

      <!-- 왼팔(몸 쪽) -->
      <path d="M74 120 Q56 140 62 168 L72 164 Q70 142 84 126 Z" fill="var(--pan-green)"/>
      <!-- 오른팔: 총을 겨눔(수평으로 뻗음) -->
      <path d="M126 122 L172 132 L172 142 L128 138 Z" fill="var(--pan-green)"/>
      <circle cx="174" cy="137" r="8" fill="var(--skin)"/><!-- 손 -->

      <!-- 가스건(블로우백 권총 실루엣) -->
      <g>
        <rect x="176" y="126" width="14" height="6" rx="1" fill="var(--steel-light)"/><!-- 슬라이드 -->
        <rect x="172" y="132" width="22" height="10" rx="2" fill="var(--steel)"/><!-- 프레임 -->
        <path d="M176 142 L180 156 L186 156 L184 142 Z" fill="var(--steel)"/><!-- 그립 -->
        <rect x="178" y="142" width="5" height="4" fill="var(--ink)"/><!-- 트리거 가드 -->
        <!-- 총구 화염 -->
        <g class="muzzle">
          <polygon points="194,137 210,131 204,137 210,143" fill="#ffcf3a"/>
          <polygon points="194,137 206,135 202,137 206,139" fill="#ff7a1a"/>
        </g>
      </g>

      <!-- 머리 -->
      <circle cx="100" cy="86" r="26" fill="var(--skin)"/>
      <!-- 귀(요정 느낌, 뾰족) -->
      <path d="M76 84 L68 78 L78 88 Z" fill="var(--skin)"/>
      <!-- 머리카락 -->
      <path d="M76 78 Q84 58 112 62 Q126 66 124 84 Q116 72 100 72 Q86 72 80 84 Z" fill="var(--hair)"/>
      <!-- 눈/코/미소 -->
      <circle cx="93" cy="86" r="2.6" fill="var(--ink)"/>
      <circle cx="107" cy="86" r="2.6" fill="var(--ink)"/>
      <path d="M92 96 Q100 102 108 96" stroke="var(--ink)" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- 모자(깃털 달린 초록 캡) -->
      <path d="M74 70 Q100 40 128 68 Q104 60 88 66 Q80 67 74 70 Z" fill="var(--pan-green-dark)"/>
      <path d="M124 64 Q150 40 142 64 Q134 60 124 66 Z" fill="var(--feather)"/><!-- 빨간 깃털 -->
    </svg>

    <button class="reset" id="resetBtn">스트레스 다시 채우기</button>
  </div>

<script>
/* ── 상태값 ── */
const STAGE   = document.getElementById('stage');
const PAN     = document.getElementById('pan');
const BAR     = document.getElementById('barFill');
const HITSPAN = document.getElementById('hitCount');
let stress = 100;   // 0이 되면 "완전히 풀림"
let hits   = 0;
const MAX_TARGETS = 6;

/* 별 배경 깔기 */
(function seedStars(){
  for(let i=0;i<26;i++){
    const s=document.createElement('div');
    s.className='star'; s.textContent='✦';
    s.style.left=Math.random()*100+'%';
    s.style.top =Math.random()*60+'%';
    s.style.animationDelay=(Math.random()*3)+'s';
    s.style.fontSize=(8+Math.random()*10)+'px';
    STAGE.appendChild(s);
  }
})();

/* 표적 1개 생성: 좌→우로 부유하며 떠다님 */
function spawnTarget(){
  const t=document.createElement('div');
  t.className='target';
  // 동심원 표적을 SVG로 그림
  t.innerHTML=`<svg viewBox="0 0 54 54">
      <circle cx="27" cy="27" r="26" fill="#fff" stroke="#c0392b" stroke-width="2"/>
      <circle cx="27" cy="27" r="18" fill="#c0392b"/>
      <circle cx="27" cy="27" r="11" fill="#fff"/>
      <circle cx="27" cy="27" r="5"  fill="#c0392b"/>
    </svg>`;
  const top = 90 + Math.random()*(window.innerHeight*0.55);
  t.style.top = top+'px';
  t.style.left = '-60px';

  // 드리프트 애니메이션 (각 표적마다 속도 랜덤)
  const dur = 6000 + Math.random()*5000;
  const drift = t.animate(
    [{transform:'translateX(0) translateY(0)'},
     {transform:`translateX(${window.innerWidth+120}px) translateY(${-30+Math.random()*60}px)`}],
    {duration:dur, easing:'linear'}
  );
  drift.onfinish = ()=>{ t.remove(); }; // 화면 밖으로 나가면 제거

  // 클릭(=사격)
  t.addEventListener('click', ()=>{
    fire();
    t.classList.add('pop');
    hits++; HITSPAN.textContent=hits;
    stress = Math.max(0, stress-8);
    BAR.style.width = stress+'%';
    setTimeout(()=>t.remove(), 300);
  });

  STAGE.appendChild(t);
}

/* 발사 연출: 반동 + 총구 화염 */
function fire(){
  PAN.classList.remove('firing');
  void PAN.offsetWidth;           // 리플로우 강제 → 애니메이션 재시작
  PAN.classList.add('firing');
}

/* 표적 개수 유지 루프 */
setInterval(()=>{
  const cur=document.querySelectorAll('.target').length;
  if(cur<MAX_TARGETS) spawnTarget();
}, 900);

/* 리셋 */
document.getElementById('resetBtn').addEventListener('click', ()=>{
  stress=100; hits=0;
  BAR.style.width='100%'; HITSPAN.textContent='0';
});

/* 초기 표적 몇 개 미리 깔기 */
for(let i=0;i<3;i++) setTimeout(spawnTarget, i*400);
</script>
</body>
</html>
